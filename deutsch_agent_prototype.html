      {
        title: 'Branding: Bedeutung, Strategien und Best Practices',
        tag: 'B1+ | Branding | 来源: acquisa.de',
        body: `<span class="kw" onclick="alert('Branding = 品牌塑造')">Branding</span> beschreibt den Prozess, mit dem ein Unternehmen seine Marke gestaltet, um eine möglichst positive Identifikation und Erfahrung damit zu ermöglichen.

<b>Ziele und Funktionen des Brandings</b>

Eines der Hauptziele besteht darin, bestimmte Werte und Botschaften zu kommunizieren, die bei den Kunden positive Gefühle und Erwartungen erzeugen. Dies schafft eine einzigartige Wahrnehmung der Marke im Kopf des Kunden.

Folgende Aspekte können durch erfolgreiches Branding erreicht werden: Assoziationen und Emotionen wecken, Vertrauen und Glaubwürdigkeit aufbauen, ein prägnantes <span class="kw" onclick="alert('Markenversprechen = 品牌承诺')">Markenversprechen</span> kommunizieren, Unterscheidungsmerkmale gegenüber Konkurrenten herausstellen.

<b>Unterschiede zwischen Branding und Marketing</b>

<span class="kw" onclick="alert('Branding = 品牌塑造')">Branding</span> bezieht sich auf die Gesamtstrategie, die Identität, Werte und Positionierung einer Marke definiert. Marketing umfasst konkrete Aktionen, um diese Strategie umzusetzen. Branding ist langfristig ausgerichtet, Marketing kurz- bis mittelfristig.

<b>Verschiedene Arten des Brandings</b>

<b><span class="kw" onclick="alert('Corporate Branding = 企业品牌')">Corporate Branding</span>:</b> Gestaltung der Unternehmensidentität als Marke. <b><span class="kw" onclick="alert('Product Branding = 产品品牌')">Product Branding</span>:</b> Markengestaltung spezifischer Produkte. <b><span class="kw" onclick="alert('Co-Branding = 联合品牌')">Co-Branding</span>:</b> Zusammenarbeit von zwei oder mehr Marken. <b><span class="kw" onclick="alert('Personal Branding = 个人品牌')">Personal Branding</span>:</b> Gestaltung der eigenen Markenidentität als Individuum. <b><span class="kw" onclick="alert('Employer Branding = 雇主品牌')">Employer Branding</span>:</b> Unternehmen als attraktiver Arbeitgeber positionieren.

<b>Elemente eines starken Brandings</b>

<span class="kw" onclick="alert('Markenidentität = 品牌身份')">Markenidentität</span>: Leistungsversprechen, Markenimage, Persönlichkeit. <span class="kw" onclick="alert('Markenkommunikation = 品牌沟通')">Markenkommunikation</span>: Klare und konsistente Vermittlung der Markenwerte. <span class="kw" onclick="alert('Markenname = 品牌名称')">Markenname</span>: Prägnant, einprägsam, einzigartig. <span class="kw" onclick="alert('Markendesign = 品牌设计')">Markendesign</span>: Farben, Schriftarten, Logos, visuelle Gestaltung.`,
        trans: `品牌塑造描述了企业设计其品牌以实现尽可能积极的认同和体验的过程。

主要目标：传达在客户中产生积极情感和期望的价值观和信息，在客户心中创造独特的品牌认知。包括激发积极的联想和情感、建立信任和可信度、传达鲜明的品牌承诺、突出与竞争对手的差异化特征。

品牌塑造与营销的区别：品牌塑造是定义身份、价值观和定位的整体战略。营销是实施该战略的具体行动。品牌塑造是长期的，营销是短中期的。

品牌类型：企业品牌、产品品牌、联合品牌、个人品牌、雇主品牌。

强品牌的要素：品牌身份（承诺、形象、个性）、品牌沟通（清晰一致传达品牌价值）、品牌名称（鲜明、易记、独特）、品牌设计（颜色、字体、标志、视觉风格）。`
      },
      {
        title: 'Branding: Der vollständige Leitfaden',
        tag: 'B1+ | Branding | 来源: sortlist.de',
        body: `Der Aufbau einer einprägsamen Marke ist von größter Wichtigkeit für den langfristigen Erfolg eines Unternehmens.

<b>Wie wird Branding durchgeführt?</b>

Branding wird durchgeführt, indem eine starke Marke entwickelt, ein konsistentes <span class="kw" onclick="alert('Markenbild = 品牌形象')">Markenbild</span> geschaffen und gezielte Kommunikationsmaßnahmen umgesetzt werden. Finde dein Markenversprechen, definiere eine ansprechende <span class="kw" onclick="alert('visuelle Identität = 视觉身份')">visuelle Identität</span> und kommuniziere auf allen Kanälen klar und einheitlich.

<b>Die Markenidentität und ihre Bedeutung</b>

Die Markenidentität bildet das Fundament und repräsentiert die essenziellen Markenwerte. Dazu zählen Leistungsversprechen, Markenimage, Persönlichkeit der Marke und das Markenerlebnis. Eine starke Markenidentität schafft Vertrauen durch deutliche <span class="kw" onclick="alert('Wiedererkennungsmerkmale = 识别特征')">Wiedererkennungsmerkmale</span>.

<b>Markenentwicklung und -kommunikation</b>

Die Markenentwicklung umfasst den Aufbau und die Pflege von Markenidentität, Markenbekanntheit und Markenimage. Dazu gehören die Definition von Markeneigenschaften, die Markenpositionierung und die Konzeption von <span class="kw" onclick="alert('Brandzeichen = 品牌标识')">Brandzeichen</span>, die auf die Zielgruppe abgestimmt sind.

<b>Anpassung an moderne Märkte</b>

Da sich Märkte und Konsumentenbedürfnisse ständig wandeln, ist Flexibilität wichtig. Neue Technologien und Kommunikationskanäle bieten Chancen: Social Media, Influencer Marketing, Podcasts und andere innovative Möglichkeiten.

<b>Bekannte Beispiele</b>

<b>Apple:</b> Steht für Innovation, Design und Benutzerfreundlichkeit. <b>Patagonia:</b> Verantwortungsbewusste, umweltfreundliche Marke. <b>Oatly:</b> Innovative, nachhaltige Marke für pflanzliche Alternativen.`,
        trans: `建立令人印象深刻的品牌对企业长期成功至关重要。

品牌塑造的方法：开发强大品牌、创建一致的品牌形象、实施有针对性的沟通措施。找到品牌承诺，定义吸引人的视觉身份，在所有渠道上清晰统一地沟通。

品牌身份是基础，代表核心品牌价值：承诺、形象、个性和品牌体验。强大品牌身份通过鲜明识别特征建立信任。

品牌开发包括建立和维护品牌身份、知名度和形象。涉及定义品牌属性、品牌定位和设计针对目标受众的品牌标识。

适应现代市场：市场和消费者需求不断变化，灵活性很重要。新技术和沟通渠道提供机会：社交媒体、网红营销、播客等。

著名案例：Apple（创新、设计、用户体验）、Patagonia（负责任、环保）、Oatly（创新、可持续的植物替代品）。`
      },
      {
        title: 'Leitfaden zum Aufbau einer Marke',
        tag: 'B1+ | Branding | 来源: business.adobe.com',
        body: `Die <span class="kw" onclick="alert('Markenstrategie = 品牌战略')">Markenstrategie</span> umfasst das übergeordnete Konzept der Marke, priorisierte Ziele und entsprechende Pläne. Konsistenz ist für eine starke Marke unverzichtbar.

<b>Die Grundlagen des Markenaufbaus</b>

1. <b>Zielgruppe verstehen:</b> Wer sind deine Kunden? Was brauchen sie? Wie kommunizieren sie?

2. <b><span class="kw" onclick="alert('Markenpositionierung = 品牌定位')">Markenpositionierung</span> definieren:</b> Was macht deine Marke einzigartig? Welche Position im Markt möchtest du einnehmen?

3. <b><span class="kw" onclick="alert('Markenstory = 品牌故事')">Markenstory</span> erzählen:</b> Eine überzeugende Geschichte verbindet Emotionen mit Fakten und macht die Marke erlebbar.

4. <b>Visuelle Identität schaffen:</b> Logo, Farbschema, Typografie – alle Elemente sollten die Markenpersönlichkeit widerspiegeln.

5. <b>Konsistente Markenkommunikation:</b> Über alle Touchpoints hinweg einheitlich auftreten – von der Website über Social Media bis zum Kundenservice.

<b>Die Markenpersönlichkeit</b>

Die <span class="kw" onclick="alert('Markenpersönlichkeit = 品牌个性')">Markenpersönlichkeit</span> definiert, wie eine Marke "spricht" und sich verhält. Ist sie seriös oder verspielt? Luxuriös oder zugänglich? Traditionell oder innovativ? Die Persönlichkeit sollte konsistent in allen Kommunikationsmitteln zum Ausdruck kommen.

<b>Markenbekanntheit aufbauen</b>

Markenbekanntheit entsteht durch wiederholte, positive Berührungspunkte mit der Zielgruppe. Wichtige Instrumente: Content-Marketing, Social-Media-Präsenz, PR und Events, Influencer-Kooperationen.

<b>Markentreue stärken</b>

Kundenzufriedenheit, <span class="kw" onclick="alert('Kundenerlebnis = 客户体验')">Kundenerlebnis</span> und emotionale Bindung sind die Säulen der Markentreue. Ein <span class="kw" onclick="alert('Kundenbindungsprogramm = 客户忠诚度计划')">Kundenbindungsprogramm</span> kann die Bindung zusätzlich stärken.`,
        trans: `品牌战略包括品牌的顶层概念、优先目标和相应计划。一致性对强大品牌不可或缺。

品牌建设基础：1.理解目标受众（客户是谁？需要什么？如何沟通？）2.定义品牌定位（什么使你的品牌独特？）3.讲述品牌故事（将情感与事实结合）4.创建视觉身份（标志、配色、字体）5.一致的品牌沟通（跨所有触点统一）。

品牌个性定义品牌如何"说话"和行为：严肃还是活泼？奢华还是亲民？传统还是创新？个性应在所有沟通工具中一致表达。

品牌知名度通过反复的正面接触点建立：内容营销、社交媒体、公关活动、网红合作。

品牌忠诚度基础：客户满意度、客户体验和情感纽带。客户忠诚度计划可以进一步增强绑定。`

      {
        title: 'Growth Hacking 2025: Innovative Strategien für explosives Wachstum',
        tag: 'B2 | Growth Hacking | 来源: niiu.de',
        body: `In 2025 steht die Nutzung von Daten und <span class="kw" onclick="alert('künstliche Intelligenz (KI) = 人工智能')">künstlicher Intelligenz</span> im Mittelpunkt erfolgreicher Growth-Hacking-Strategien. Unternehmen setzen verstärkt auf KI-gestützte Analysetools, um Kundenverhalten vorherzusagen und Marketingmaßnahmen in Echtzeit zu optimieren.
<b>Datengetriebenes Growth Hacking</b>
Durch die Analyse großer Datenmengen können Unternehmen präzise <span class="kw" onclick="alert('Zielgruppen = 目标受众')">Zielgruppen</span> identifizieren. <span class="kw" onclick="alert('Predictive Analytics = 预测分析')">Predictive Analytics</span> ermöglicht die Vorhersage von Trends und Kundenverhalten durch Algorithmen. <span class="kw" onclick="alert('Kundensegmentierung = 客户细分')">Kundensegmentierung</span> teilt Kunden in spezifische Segmente für gezieltere Marketingaktionen.
<b>Virale Loops und Referral-Programme</b>
<span class="kw" onclick="alert('Referral-Marketing = 推荐营销')">Referral-Marketing</span> erlebt ein Comeback. Der <span class="kw" onclick="alert('virale Koeffizient (K-Faktor) = 病毒系数')">virale Koeffizient (K-Faktor)</span> bestimmt, wie viele neue Nutzer jeder bestehende Nutzer bringt. Dropbox erreichte einen K-Faktor von 2,8 durch ihr <span class="kw" onclick="alert('Referral-Programm = 推荐计划')">Referral-Programm</span>. <span class="kw" onclick="alert('Gamification = 游戏化')">Gamification</span>-Elemente und <span class="kw" onclick="alert('Belohnungssysteme = 奖励系统')">Belohnungssysteme</span> fördern virale Verbreitung.
<b>Content Atomization und AR</b>
<span class="kw" onclick="alert('Content Atomization = 内容原子化')">Content Atomization</span> fragmentiert Inhalte in kleine, <span class="kw" onclick="alert('Multi-Channel-Strategie = 多渠道策略')">Multi-Channel</span>-optimierte <span class="kw" onclick="alert('Inhaltsatome = 内容碎片')">Inhaltsatome</span>. <span class="kw" onclick="alert('Augmented Reality (AR) = 增强现实')">Augmented Reality</span> wird für immersive <span class="kw" onclick="alert('Kundenerlebnisse = 客户体验')">Kundenerlebnisse</span> genutzt – von virtuellen Produkttests bis zu interaktiven Brand-Erlebnissen.
<b>Micro-Influencer Partnerschaften</b>
Statt weniger großer Influencer bauen Unternehmen <span class="kw" onclick="alert('Netzwerke = 网络')">Netzwerke</span> aus zahlreichen <span class="kw" onclick="alert('Micro-Influencer = 小微网红')">Micro-Influencern</span> auf, die höhere <span class="kw" onclick="alert('Engagement-Raten = 互动率')">Engagement-Raten</span> und authentischere Verbindungen bieten.`,
        trans: `2025年，数据和人工智能的使用是成功增长黑客策略的核心。企业越来越多地使用AI驱动的分析工具来预测客户行为并实时优化营销措施。
数据驱动增长黑客：通过分析大量数据精准识别目标受众，预测分析通过算法预测趋势和客户行为，客户细分将客户分为特定细分进行更精准的营销。
病毒循环和推荐计划：推荐营销正在复兴。病毒系数（K因子）决定每个现有用户带来多少新用户。Dropbox通过推荐计划达到2.8的K因子。游戏化元素和奖励系统促进病毒传播。
内容原子化：将内容碎片化为多渠道优化的小型内容单元。增强现实用于沉浸式客户体验——从虚拟产品测试到互动品牌体验。
微网红合作：企业不再依赖少数大网红，而是建立众多微网红网络，提供更高的互动率和更真实的连接。`
      },
      {
        title: 'Content Marketing als selbstverstärkender Wachstumsmotor',
        tag: 'B2 | Content Marketing | 来源: anyhelpnow.com',
        body: `Content Marketing ist die kosteneffizienteste Form des <span class="kw" onclick="alert('Growth Hacking = 增长黑客')">Growth Hackings</span>. Einmal erstellter Content generiert über Jahre hinweg <span class="kw" onclick="alert('Traffic = 流量')">Traffic</span> und <span class="kw" onclick="alert('Leads = 潜在客户')">Leads</span>.
<b>ICE-Scoring und Experimentierkultur</b>
Das <span class="kw" onclick="alert('ICE-Scoring = ICE评分法')">ICE-Scoring-Framework</span> (Impact, Confidence, Ease) priorisiert Experimente. Die <span class="kw" onclick="alert('Conversion Rate Optimierung = 转化率优化')">Conversion Rate Optimierung (CRO)</span> durch <span class="kw" onclick="alert('A/B-Testing = A/B测试')">A/B-Testing</span> kann dramatische Ergebnisse liefern – kleine Änderungen wie die Farbe eines Buttons steigern die Conversion oft um 20-30 %.
<b>Wichtige Metriken</b>
Die wichtigsten <span class="kw" onclick="alert('Metriken = 指标')">Metriken</span> sind: <span class="kw" onclick="alert('Customer Acquisition Cost (CAC) = 客户获取成本')">CAC</span>, <span class="kw" onclick="alert('Lifetime Value (LTV) = 生命周期价值')">LTV</span>, <span class="kw" onclick="alert('Activation Rate = 激活率')">Activation Rate</span>, <span class="kw" onclick="alert('Retention Rate = 留存率')">Retention Rate</span> und <span class="kw" onclick="alert('Referral Rate = 推荐率')">Referral Rate</span>.
<b>Marketing Automation und E-Mail</b>
<span class="kw" onclick="alert('E-Mail Marketing = 邮件营销')">E-Mail Marketing</span> generiert durchschnittlich 38 Euro Return pro investiertem Euro. <span class="kw" onclick="alert('Drip-Kampagnen = 滴灌活动')">Drip-Kampagnen</span> und <span class="kw" onclick="alert('Lead Magnets = 诱饵内容')">Lead Magnets</span> sind zentrale Werkzeuge. <span class="kw" onclick="alert('GDPR-Compliance = GDPR合规')">GDPR-Compliance</span> mit Double Opt-in ist Pflicht.`,
        trans: `内容营销是增长黑客中成本效益最高的形式。一次创建的内容可以在多年内持续产生流量和潜在客户。
ICE评分和实验文化：ICE评分框架（影响、信心、容易度）对实验进行优先级排序。通过A/B测试进行转化率优化可以产生显著效果——小改变如按钮颜色通常能将转化率提高20-30%。
重要指标：最重要的指标是CAC、LTV、激活率、留存率和推荐率。
营销自动化和邮件：邮件营销每投资1欧元平均产生38欧元的回报。滴灌活动和诱饵内容是核心工具。GDPR合规与双重确认是必需的。`

      {

        tag: 'B2 | CRO | 来源: anyhelpnow.com',
        body: `Während die meisten Unternehmen besessen von mehr Traffic sind, übersehen sie den mächtigsten Hebel: die Optimierung bestehender Besucher. Eine Verdopplung der <span class="kw" onclick="alert('Conversion Rate = 转化率')">Conversion Rate</span> hat denselben Effekt wie eine Verdopplung des Traffics – kostet aber erheblich weniger.
<b>Landing Page Optimierung</b>
Die <span class="kw" onclick="alert('Landing Page Optimierung = 着陆页优化')">Landing Page Optimierung</span> beginnt mit der Eliminierung von Ablenkungen. <span class="kw" onclick="alert('Heatmaps = 热力图')">Heatmaps</span> und <span class="kw" onclick="alert('Session Recordings = 会话录屏')">Session Recordings</span> zeigen, wo Nutzer stocken. Die <span class="kw" onclick="alert('Checkout-Optimierung = 结账优化')">Checkout-Optimierung</span> ist pure Wissenschaft: jedes zusätzliche Formularfeld reduziert die <span class="kw" onclick="alert('Completion Rate = 完成率')">Completion Rate</span>.
<b>Systematische Growth-Kultur</b>
Die Transformation zu einer systematischen <span class="kw" onclick="alert('Growth-Kultur = 增长文化')">Growth-Kultur</span> ist der Schlüssel. <span class="kw" onclick="alert('Cross-funktionale Teams = 跨职能团队')">Cross-funktionale Teams</span> aus Product, Marketing, Data und Engineering ermöglichen schnelle Experimente. Die 70-20-10-Regel für <span class="kw" onclick="alert('Budget-Allokation = 预算分配')">Budget-Allokation</span>: 70 % in bewährte Kanäle, 20 % in Experimente, 10 % in Innovationen.`,
        trans: `当大多数企业痴迷于更多流量时，他们忽略了最强大的杠杆：优化现有访客。转化率翻倍与流量翻倍效果相同——但成本低得多。
着陆页优化：从消除干扰开始。热力图和会话录屏显示用户在何处卡住。结账优化是纯粹的科学：每个额外的表单字段都会降低完成率。

      {
        title: 'Content-Marketing-Strategien: So planst du deinen Erfolg 2025',
        tag: 'B2 | Content Marketing | 来源: schluetersche.de',
        body: `<span class="kw" onclick="alert('Content-Marketing = 内容营销')">Content-Marketing</span> ist eine strategische Herangehensweise, bei der relevante und konsistente Inhalte erstellt werden, um wertvolle Kundenbeziehungen aufzubauen.
<b>Strategieplanung</b>
Die Entwicklung beginnt mit einer Analyse der Position und der Definition von <span class="kw" onclick="alert('SMART-Ziele = SMART目标')">SMART-Zielen</span>. Eine gründliche <span class="kw" onclick="alert('Zielgruppenanalyse = 目标受众分析')">Zielgruppenanalyse</span> ist unverzichtbar. Der <span class="kw" onclick="alert('Redaktionsplan = 编辑日历')">Redaktionsplan</span> ist der Dreh- und Angelpunkt jeder Content-Strategie.
<b>Inbound-Marketing und Storytelling</b>
<span class="kw" onclick="alert('Inbound-Marketing = 集客营销')">Inbound-Marketing</span> gewinnt Kunden durch wertvolle Inhalte. <span class="kw" onclick="alert('Storytelling = 讲故事')">Storytelling</span> verbindet Emotionen und Markenidentität. Die <span class="kw" onclick="alert('SEO-Optimierung = SEO优化')">SEO-Optimierung</span> erhöht die <span class="kw" onclick="alert('Sichtbarkeit = 可见性')">Sichtbarkeit</span> bei Suchanfragen.
<b>Content-Personalisierung</b>
<span class="kw" onclick="alert('Content-Personalisierung = 内容个性化')">Content-Personalisierung</span> passt Inhalte an verschiedene <span class="kw" onclick="alert('Segmente = 细分')">Segmente</span> an. Personalisierte E-Mails oder Web-Inhalte erzielen höhere <span class="kw" onclick="alert('Engagement-Raten = 互动率')">Engagement-Raten</span>.
<b>Content Distribution</b>
Die Auswahl der richtigen <span class="kw" onclick="alert('Plattformen = 平台')">Plattformen</span> hängt von der Zielgruppe ab: Instagram und TikTok für visuelle Inhalte, LinkedIn für B2B, E-Mail für gezielte Informationen. Eine <span class="kw" onclick="alert('Hybridlösung = 混合方案')">Hybridlösung</span> aus Automatisierung und manueller Verteilung ist optimal.`,
        trans: `内容营销是一种战略方法，通过创建相关且一致的内容来建立有价值的客户关系。
策略规划：从分析当前定位和定义SMART目标开始。彻底的目标受众分析不可或缺。编辑日历是每个内容策略的核心。
集客营销和故事讲述：集客营销通过有价值的内容吸引客户。故事讲述连接情感和品牌身份。SEO优化提高搜索可见性。
内容个性化：内容个性化根据不同细分调整内容。个性化邮件或网页内容获得更高的互动率。
内容分发：选择合适的平台取决于目标受众：Instagram和TikTok适合视觉内容，LinkedIn适合B2B，邮件适合精准信息。自动化和手动分发的混合方案是最优的。`
      },
      {
        title: 'Die wichtigsten Content-Marketing-Strategien im Überblick',
        tag: 'B2 | Content | 来源: schluetersche.de',
        body: `Content-Marketing ist ein bedeutender Bestandteil der <span class="kw" onclick="alert('Unternehmenskommunikation = 企业沟通')">Unternehmenskommunikation</span>. Es ermöglicht die gezielte Ansprache der Zielgruppe und fördert die <span class="kw" onclick="alert('Markenbindung = 品牌忠诚')">Markenbindung</span>.
<b>Inbound-Marketing</b>
Statt potenzielle Kunden direkt mit Werbung anzusprechen, geht es darum, deren Aufmerksamkeit auf indirekte Weise zu gewinnen – durch <span class="kw" onclick="alert('Blog-Beiträge = 博客文章')">Blog-Beiträge</span>, <span class="kw" onclick="alert('Tutorials = 教程')">Tutorials</span> oder <span class="kw" onclick="alert('Infografiken = 信息图')">Infografiken</span>. So baust du <span class="kw" onclick="alert('Vertrauen = 信任')">Vertrauen</span> auf und positionierst dich als verlässliche Quelle.
<b>Storytelling und SEO</b>
<span class="kw" onclick="alert('Storytelling = 故事讲述')">Storytelling</span> dreht sich um die Kunst des Geschichtenerzählens, um die emotionale Verbindung zur Marke zu stärken. Die <span class="kw" onclick="alert('SEO-Optimierung = SEO优化')">SEO-Optimierung</span> mit relevanten <span class="kw" onclick="alert('Keywords = 关键词')">Keywords</span> erhöht die organische <span class="kw" onclick="alert('Reichweite = 覆盖面')">Reichweite</span>.
<b>Social Media als Verstärker</b>
<span class="kw" onclick="alert('Social Media Plattformen = 社交媒体平台')">Social Media Plattformen</span> dienen als Erweiterung der Content-Strategie. <span class="kw" onclick="alert('Plattformspezifische Formate = 平台特定格式')">Plattformspezifische Formate</span> wie Reels, Stories oder Live-Content fördern die <span class="kw" onclick="alert('virale Verbreitung = 病毒传播')">virale Verbreitung</span>.
<b>Trends 2025</b>
<span class="kw" onclick="alert('KI-gestützte Inhalte = AI驱动内容')">KI-gestützte Inhalte</span>, <span class="kw" onclick="alert('Virtual Reality (VR) = 虚拟现实')">VR</span> und <span class="kw" onclick="alert('Augmented Reality (AR) = 增强现实')">AR</span> schaffen immersive Erlebnisse. <span class="kw" onclick="alert('Blockchain = 区块链')">Blockchain</span> sorgt für Transparenz bei Content-Prozessen. <span class="kw" onclick="alert('Datenschutz = 数据保护')">Datenschutz</span> und ethische Aspekte spielen eine zentrale Rolle.`,
        trans: `内容营销是企业沟通的重要组成部分。它实现了对目标群体的精准触达并促进品牌忠诚。
集客营销：不是直接做广告，而是通过博客文章、教程或信息图间接获得注意力。建立信任并将自己定位为可靠来源。
故事讲述和SEO：故事讲述围绕讲故事的艺术展开，以加强与品牌的情感联系。通过相关关键词的SEO优化提高有机覆盖面。
社交媒体作为放大器：社交媒体平台作为内容策略的扩展。平台特定格式如Reels、故事或直播内容促进病毒传播。
2025趋势：AI驱动的内容、VR和AR创造沉浸式体验。区块链确保内容过程的透明度。数据保护和伦理方面发挥核心作用。`

      {
        title: 'Content Distribution und Multi-Channel-Strategie 2025',
        tag: 'B2 | Distribution | 来源: schluetersche.de',
        body: `Ein durchdachter <span class="kw" onclick="alert('Content-Distribution = 内容分发')">Content-Distribution-Ansatz</span> ist der Schlüssel, damit deine Inhalte ihre maximale Wirkung entfalten können.
<b>Kanäle für die Verbreitung</b>
Die Auswahl der richtigen <span class="kw" onclick="alert('Vertriebskanäle = 分发渠道')">Vertriebskanäle</span> hängt davon ab, wo sich deine Zielgruppe aufhält. <span class="kw" onclick="alert('Instagram = Instagram')">Instagram</span> und <span class="kw" onclick="alert('TikTok = TikTok')">TikTok</span> sind hervorragend für visuelle Inhalte. <span class="kw" onclick="alert('LinkedIn = LinkedIn')">LinkedIn</span> ist bevorzugt für <span class="kw" onclick="alert('B2B-Kommunikation = B2B沟通')">B2B-Kommunikation</span>. <span class="kw" onclick="alert('E-Mail-Marketing = 邮件营销')">E-Mail-Marketing</span> bleibt eine leistungsstarke Methode.
<b>Automatisierung vs. manuelle Verteilung</b>
<span class="kw" onclick="alert('Automatisierte Systeme = 自动化系统')">Automatisierte Systeme</span> sparen Zeit, bringen aber fehlende Personalisierung. <span class="kw" onclick="alert('Manuelle Verteilung = 手动分发')">Manuelle Verteilung</span> erlaubt Kreativität, ist aber zeitintensiv. <span class="kw" onclick="alert('Hybridlösungen = 混合方案')">Hybridlösungen</span> verbinden das Beste aus beiden Welten.
<b>Optimierung der Distribution</b>
Analysiere regelmäßig die <span class="kw" onclick="alert('Performance = 表现/效果')">Performance</span> deiner Inhalte. Führe <span class="kw" onclick="alert('A/B-Tests = A/B测试')">A/B-Tests</span> durch, um die besten Formate und Zeiten zu finden. Experimentiere mit neuen Formaten und bleibe flexibel.`,
        trans: `深思熟虑的内容分发策略是确保内容发挥最大效果的关键。
分发渠道：选择正确的分发渠道取决于你的目标受众在哪里。Instagram和TikTok非常适合视觉内容，LinkedIn是B2B沟通的首选，邮件营销仍然是一种强大的方法。

  13: {
    theme: '营销自动化与CRM系统',
    tag: 'B2 | Marketing Automation',
    time: '约 50 min',
    articles: [
      {
        title: 'Marketing Automation 2025: Defintion, Vorteile und Tools',
        tag: 'B2 | Automation | 来源: defacto.de',
        body: `<span class="kw" onclick="alert('Marketing Automation = 营销自动化')">Marketing Automation</span> bezeichnet den strategischen Einsatz von Technologien, um auf Basis von Daten, Verhalten und klaren Journeys relevante Inhalte zur richtigen Zeit an die richtige Zielgruppe zu bringen.
<b>Warum gerade jetzt?</b>
2025 stehen Marketer vor einer paradoxen Herausforderung: mehr Kanäle, mehr Daten, aber weniger Zeit. Nutzer wollen sofortige, personalisierte Kommunikation über Website, App, E-Mail und soziale Medien. <span class="kw" onclick="alert('Cookie-Limits = Cookie限制')">Cookie-Limits</span> und die <span class="kw" onclick="alert('DSGVO = GDPR')">DSGVO</span> erschweren verlässliche Insights.
<b>Unterschied zu CRM und E-Mail-Tools</b>
Ein <span class="kw" onclick="alert('CRM = 客户关系管理')">CRM</span> speichert, was wir über Kunden wissen. E-Mail-Tools helfen uns, Nachrichten zu verschicken. Marketing Automation verbindet beides – automatisch die passende Botschaft dann, wenn sie relevant ist.
<b>Die 5 wichtigsten Anwendungsfelder</b>
1. <span class="kw" onclick="alert('Lead Nurturing = 潜客培育')">Lead Nurturing</span>: automatisierte Sequenzen basierend auf Content-Interesse
2. <span class="kw" onclick="alert('Onboarding = 新手引导')">Onboarding</span>: gezielte Journey nach Produktregistrierung
3. <span class="kw" onclick="alert('Reaktivierung = 重新激活')">Reaktivierung</span>: inaktive Personen kontextbasiert zurückholen
4. <span class="kw" onclick="alert('Cross-/Upselling = 交叉/向上销售')">Cross-/Upselling</span>: passgenaue Angebote auf Basis von Käufen
5. <span class="kw" onclick="alert('Retention & Loyalty = 留存与忠诚')">Retention & Loyalty</span>: langfristige Bindung durch Lifecycle-Journeys`,
        trans: `营销自动化是指战略性地使用技术，基于数据、行为和清晰的旅程，在正确的时间向正确的受众传递相关内容。
为什么现在正当时？2025年营销人员面临一个矛盾挑战：更多的渠道、更多的数据，但更少的时间。用户希望通过网站、应用、邮件和社交媒体获得即时、个性化的沟通。
与CRM和邮件工具的区别：CRM存储我们了解的客户信息。邮件工具帮助我们发送消息。营销自动化将两者结合起来——在相关时自动发送合适的信息。
5大应用领域：1.潜客培育：基于内容兴趣的自动化序列 2.新手引导：产品注册后的目标化旅程 3.重新激活：基于上下文找回不活跃用户 4.交叉/向上销售：基于购买行为的精准推荐 5.留存与忠诚：通过生命周期旅程实现长期绑定。`
      },
      {
        title: 'CRM-Systeme: Vorteile, Wirkung und Trends 2025',
        tag: 'B2 | CRM | 来源: business-on.de',
        body: `Ein <span class="kw" onclick="alert('CRM-System = 客户关系管理系统')">CRM-System</span> (Customer Relationship Management) hilft Unternehmen, Kundenbeziehungen systematisch zu verwalten und zu optimieren.
<b>Kernfunktionen eines CRM</b>
Moderne CRM-Systeme bieten <span class="kw" onclick="alert('Kontaktverwaltung = 联系人管理')">Kontaktverwaltung</span>, <span class="kw" onclick="alert('Verkaufspipeline = 销售管道')">Verkaufspipeline</span>-Management, <span class="kw" onclick="alert('Automatisierung = 自动化')">Automatisierung</span> von Vertriebsprozessen und umfassende <span class="kw" onclick="alert('Analytics = 分析')">Analytics</span>-Funktionen. Sie zentralisieren alle Kundeninteraktionen an einem Ort.
<b>Vorteile eines CRM</b>
• Bessere <span class="kw" onclick="alert('Kundenbindung = 客户忠诚度')">Kundenbindung</span> durch personalisierte Kommunikation
• Höhere <span class="kw" onclick="alert('Effizienz = 效率')">Effizienz</span> durch automatisierte Prozesse
• <span class="kw" onclick="alert('Datenbasierte Entscheidungen = 数据驱动决策')">Datenbasierte Entscheidungen</span> durch zentrale Datenhaltung
• Steigerung der <span class="kw" onclick="alert('Konversionsrate = 转化率')">Konversionsrate</span> durch bessere Lead-Verfolgung
<b>CRM und Marketing Automation</b>
Die Verknüpfung von CRM und <span class="kw" onclick="alert('Marketing Automation = 营销自动化')">Marketing Automation</span> ermöglicht eine nahtlose Analyse des kompletten Marketing- und Vertriebsprozesses. Daten aus dem CRM fließen in automatisierte Kampagnen und verbessern so die <span class="kw" onclick="alert('Lead-Qualität = 潜客质量')">Lead-Qualität</span>.`,
        trans: `CRM系统（客户关系管理）帮助企业系统化地管理和优化客户关系。
核心功能：现代CRM系统提供联系人管理、销售管道管理、销售流程自动化和全面的分析功能。它们将所有客户互动集中在一个地方。
优势：通过个性化沟通实现更好的客户忠诚度、通过自动化流程提高效率、通过集中数据管理实现数据驱动决策、通过更好的潜客跟进提高转化率。
CRM与营销自动化：CRM和营销自动化的连接实现了对完整营销和销售流程的无缝分析。CRM中的数据流入自动化活动，从而提高潜客质量。`
      },
      {
        title: 'Marketing Automation KPIs und Erfolgsmessung',
        tag: 'B2 | KPIs | 来源: defacto.de',
        body: `Die richtigen <span class="kw" onclick="alert('Kennzahlen = 关键指标')">Kennzahlen</span> zeigen, ob deine Marketing Automation erfolgreich ist.
<b>Wichtige KPIs</b>
• <span class="kw" onclick="alert('Öffnungs- und Klickraten = 打开率和点击率')">Öffnungs- und Klickraten (CTR)</span>: Zeigen, ob Inhalte relevant sind
• <span class="kw" onclick="alert('Conversion Rate = 转化率')">Conversion Rate</span>: Misst, ob Empfänger die gewünschte Handlung ausführen
• <span class="kw" onclick="alert('Customer Lifetime Value (CLV) = 客户生命周期价值')">CLV</span>: Langfristiger Wert pro Kunde steigt bei Loyalitäts-Journeys
• <span class="kw" onclick="alert('Reaktivierungsrate = 重新激活率')">Reaktivierungsrate</span>: Anteil zurückgeholter inaktiver Kontakte
• <span class="kw" onclick="alert('Churn Rate = 流失率')">Churn Rate</span>: Zeigt, ob Kunden länger gehalten werden
<b>Tools im Vergleich</b>
• <span class="kw" onclick="alert('Einsteiger-Tools = 入门工具')">Einsteiger</span>: Mailchimp, ActiveCampaign
• <span class="kw" onclick="alert('Mittelstand = 中型企业方案')">Mittelstand</span>: HubSpot, Marketo
• <span class="kw" onclick="alert('Enterprise = 企业级方案')">Enterprise</span>: Salesforce Marketing Cloud, SAP Emarsys
<b>Dos und Don'ts</b>
✅ Mit klaren Zielen starten | ❌ Tool vor Strategie wählen
✅ Klein anfangen, dann skalieren | ❌ Alles automatisieren, auch wenn es unpersönlich wirkt
✅ KPIs regelmäßig messen | ❌ Abteilungen isoliert arbeiten lassen`,
        trans: `正确的关键指标显示你的营销自动化是否成功。
重要KPI：打开率和点击率（CTR）——显示内容是否相关；转化率——衡量收件人是否执行了期望操作；客户生命周期价值（CLV）——通过忠诚度旅程提高每位客户的长期价值；重新激活率——找回的不活跃客户比例；流失率——显示客户是否被更长时间保留。
工具对比：入门级：Mailchimp、ActiveCampaign；中型企业：HubSpot、Marketo；企业级：Salesforce Marketing Cloud、SAP Emarsys。
应该/不应该：✅ 从明确目标开始 | ❌ 先选工具再做策略；✅ 从小做起然后规模化 | ❌ 一切自动化即使显得不人性化；✅ 定期衡量KPI | ❌ 部门各自为政。`
      }

  14: {
    theme: '数据隐私与Cookieless未来',
    tag: 'B2 | Datenschutz & Privacy',
    time: '约 50 min',
    articles: [
      {
        title: 'Cookieless Tracking: Wie digitales Marketing ohne Cookies funktioniert',
        tag: 'B2 | Cookieless | 来源: onlinemarketingmagazin.de',
        body: `<span class="kw" onclick="alert('Cookieless Tracking = 无Cookie追踪')">Cookieless Tracking</span> beschreibt Verfahren zur Analyse von Nutzerverhalten ohne den Einsatz klassischer <span class="kw" onclick="alert('Cookies = Cookie(网络追踪器)')">Cookies</span>, insbesondere <span class="kw" onclick="alert('Third-Party-Cookies = 第三方Cookie')">Third-Party-Cookies</span>.
<b>Treiber für die Abkehr von Cookies</b>
Mehrere Faktoren beschleunigen die Abkehr: <span class="kw" onclick="alert('Datenschutzgesetze = 数据保护法')">Datenschutzgesetze</span> wie die <span class="kw" onclick="alert('DSGVO = GDPR')">DSGVO</span> setzen enge Grenzen. Browser wie Safari und Firefox blockieren Third-Party-Cookies bereits. Google Chrome hat die Abschaffung angekündigt.
<b>Technologien im Cookieless Tracking</b>
• <span class="kw" onclick="alert('Serverseitiges Tracking = 服务器端追踪')">Serverseitiges Tracking</span>: Daten werden über den eigenen Server verarbeitet
• <span class="kw" onclick="alert('Kontextuelles Tracking = 上下文追踪')">Kontextuelles Tracking</span>: Analysiert Inhalte und Umfelder statt Nutzer
• <span class="kw" onclick="alert('Aggregierte Messmodelle = 聚合测量模型')">Aggregierte Messmodelle</span>: Zusammenfassung auf Gruppenebene
• <span class="kw" onclick="alert('First-Party-Daten = 第一方数据')">First-Party-Daten</span>: Gewinnen massiv an Bedeutung
<b>Vorteile für Datenschutz</b>
Verbesserter <span class="kw" onclick="alert('Datenschutz = 数据保护')">Datenschutz</span>, geringeres Risiko von Datenschutzverstößen, Stärkung des <span class="kw" onclick="alert('Kundenvertrauen = 客户信任')">Kundenvertrauens</span> und <span class="kw" onclick="alert('Wettbewerbsvorteil = 竞争优势')">Wettbewerbsvorteil</span> in datensensiblen Branchen.`,
        trans: `无Cookie追踪描述了在不使用传统Cookie（尤其是第三方Cookie）的情况下分析用户行为的方法。
告别Cookie的驱动力：数据保护法如GDPR设定了严格限制。Safari和Firefox已默认阻止第三方Cookie。Google Chrome已宣布废除。
无Cookie追踪技术：服务器端追踪——数据通过自有服务器处理；上下文追踪——分析内容和环境而非用户；聚合测量模型——在群组层面汇总；第一方数据——变得越来越重要。
数据保护的优势：更好的数据保护、更小的数据违规风险、加强客户信任、在数据敏感行业中的竞争优势。`
      },
      {
        title: 'Die Zukunft von Cookies & Consent: Wohin entwickelt sich das Tracking?',
        tag: 'B2 | Datenschutz | 来源: creationell.de',
        body: `Das digitale Tracking befindet sich in einem historischen Umbruch: <span class="kw" onclick="alert('Third-Party-Cookies = 第三方Cookie')">Third-Party-Cookies</span> verschwinden, <span class="kw" onclick="alert('Datenschutzgesetze = 数据保护法律')">Datenschutzgesetze</span> werden strenger.
<b>First-Party-Daten werden zum Goldstandard</b>
<span class="kw" onclick="alert('Owned Data = 自有数据')">Owned Data</span> wird zum strategischen Vorteil – unabhängig von Browserrestriktionen. Unternehmen nutzen <span class="kw" onclick="alert('First-Party-Cookies = 第一方Cookie')">First-Party-Cookies</span> (mit Consent), eigene <span class="kw" onclick="alert('CRM-Daten = CRM数据')">CRM-Daten</span>, <span class="kw" onclick="alert('Login-Bereiche = 登录区域')">Login-Bereiche</span> und Kundenkonten.
<b>Consent Management wird intelligent</b>
Statt störender Banner kommen automatisch personalisierte <span class="kw" onclick="alert('Consent-Banner = 同意弹窗')">Consent-Banner</span>. Das <span class="kw" onclick="alert('Consent Management System (CMS) = 同意管理系统')">Consent Management System</span> wird strategisch entscheidend.
<b>Server-Side Tracking als Standard</b>
<span class="kw" onclick="alert('Server-Side Tracking = 服务器端追踪')">Server-Side Tracking</span> wird zur dominierenden Methode. Vorteile: mehr Datenschutz, bessere Datenqualität, Schutz vor <span class="kw" onclick="alert('Adblockern = 广告拦截器')">Adblockern</span> und Unabhängigkeit von Browserrestriktionen.
<b>Neue Identifier</b>
<span class="kw" onclick="alert('Unified IDs = 统一ID')">Unified IDs</span> wie <span class="kw" onclick="alert('UID2.0 = UID2.0')">UID2.0</span> und die Google <span class="kw" onclick="alert('Privacy Sandbox = 隐私沙盒')">Privacy Sandbox</span> mit <span class="kw" onclick="alert('Topics API = Topics API')">Topics API</span> sollen Tracking ohne Cookies ermöglichen.`,
        trans: `数字追踪正处于历史性转折点：第三方Cookie消失，数据保护法更加严格。
第一方数据成为黄金标准：自有数据成为战略优势——不受浏览器限制。企业使用第一方Cookie、自有CRM数据、登录区域和客户账户。
同意管理将变得更加智能：不再是烦人的弹窗，而是自动个性化的同意弹窗。同意管理系统变得具有战略重要性。
服务器端追踪作为标准：服务器端追踪将成为主导方法。优势：更好的数据保护、更高的数据质量、防止广告拦截器、不受浏览器限制。
新的标识符：统一ID如UID2.0和Google隐私沙盒通过Topics API实现无Cookie追踪。`
      },
      {
        title: 'Was Unternehmen jetzt für die Cookieless-Zukunft tun müssen',
        tag: 'B2 | Strategie | 来源: creationell.de',
        body: `Unternehmen stehen vor der Herausforderung, ihre Marketing- und Analyseprozesse komplett neu auszurichten.
<b>5 Sofortmaßnahmen</b>
1. <span class="kw" onclick="alert('Consent Management = 同意管理')">Consent Management</span> modernisieren – DSGVO-konform, barrierefrei, ohne <span class="kw" onclick="alert('Dark Patterns = 暗黑模式(诱导设计)')">Dark Patterns</span>
2. <span class="kw" onclick="alert('First-Party-Daten = 第一方数据')">First-Party-Daten</span> ausbauen – CRM optimieren, Newsletter stärken, <span class="kw" onclick="alert('Loyalty-Programme = 忠诚计划')">Loyalty-Programme</span> etablieren
3. Auf <span class="kw" onclick="alert('Server-Side-Tracking = 服务器端追踪')">Server-Side-Tracking</span> umsteigen – für Datenqualität und Datenschutz
4. Auf <span class="kw" onclick="alert('Cookielose Analyse = 无Cookie分析')">cookielose Analyse</span> vorbereiten – GA4, Matomo & Co.
5. Rechtliche Entwicklungen aktiv beobachten – <span class="kw" onclick="alert('ePrivacy-Verordnung = 电子隐私法规')">ePrivacy-Verordnung</span> und <span class="kw" onclick="alert('KI-Regulierung = AI法规')">KI-Regulierung</span>
<b>User-zentriertes Tracking</b>
Von Überwachung zu freiwilliger <span class="kw" onclick="alert('Interaktion = 互动')">Interaktion</span>. Nutzer wollen Sicherheit, Privatsphäre und Kontrolle. Unternehmen müssen echten <span class="kw" onclick="alert('Mehrwert = 附加价值')">Mehrwert</span> bieten und <span class="kw" onclick="alert('Transparenz = 透明度')">Transparenz</span> schaffen.
Wer frühzeitig umstellt, profitiert von besserer Datenqualität, konformen Prozessen, nachhaltiger Marketing-Performance und höherem <span class="kw" onclick="alert('Vertrauen = 信任')">Vertrauen</span> bei Nutzern.`,
        trans: `企业面临着完全重新调整营销和分析流程的挑战。
5项立即措施：1.现代化同意管理——符合GDPR、无障碍、无暗黑模式；2.扩展第一方数据——优化CRM、加强简讯、建立忠诚计划；3.转向服务器端追踪——确保数据质量和数据保护；4.为无Cookie分析做准备——GA4、Matomo等；5.积极关注法律发展——电子隐私法规和AI法规。
以用户为中心的追踪：从监控到自愿互动。用户想要安全、隐私和控制。企业必须提供真正的附加价值和透明度。
提前转型的企业将受益于更好的数据质量、合规流程、可持续的营销效果和更高的用户信任。`
      }

// ========================
// 日历
// ========================
function renderCal() {
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  for (let i=1;i<=14;i++) {
    const c = document.createElement('div');
    c.className = 'cal-cell';
    c.textContent = i;
    if (APP.completed.includes(i)) { c.classList.add('done'); c.onclick=()=>openDay(i); }
    else { c.classList.add('today'); c.onclick=()=>openDay(i); }
    g.appendChild(c);
  }
}

function openDay(day) {
  APP.day = day;
  APP.artIdx = 0;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-content').classList.add('active');
  document.getElementById('contentTitle').textContent = `Day ${day} / 14 — ${DAYS[day]?.theme||''}`;
  switchTab('review');
}

function goBack() {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-cal').classList.add('active');
  renderCal();
}

// ========================
// Tab 切换
// ========================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  const map = {review:'pane-review',reading:'pane-reading',vocab:'pane-vocab',quiz:'pane-quiz'};
  document.getElementById(map[tab]).classList.add('active');
  if (tab==='review') renderReview();
  if (tab==='reading') { APP.artIdx=0; renderReading(); }
  if (tab==='vocab') renderVocab();
  if (tab==='quiz') renderQuiz();
  updateProg(tab);
}

function updateProg(tab) {
  const order = ['review','reading','vocab','quiz'];
  document.getElementById('progFill').style.width = ((order.indexOf(tab)+1)/4*100)+'%';
}

// ========================
// 阅读页（支持多篇文章）
// ========================
function renderReading() {
  const d = DAYS[APP.day];
  if (!d) return;
  const art = d.articles[APP.artIdx];
  document.getElementById('artTag').innerHTML = `<span>${art.tag}</span><span>${d.time}</span>`;
  document.getElementById('artTitle').textContent = art.title;
  document.getElementById('artBody').innerHTML = art.body;
  document.getElementById('transBox').textContent = art.trans;
  document.getElementById('transBox').classList.remove('show');
  document.getElementById('btnTrans').textContent = '🇨🇳 中文翻译';
  document.getElementById('artNum').textContent = `${APP.artIdx+1} / ${d.articles.length}`;
  document.getElementById('artPrev').classList.toggle('disabled', APP.artIdx===0);
  document.getElementById('artNext').classList.toggle('disabled', APP.artIdx===d.articles.length-1);
}

function prevArt() {
  if (APP.artIdx > 0) { APP.artIdx--; renderReading(); }
}
function nextArt() {
  const d = DAYS[APP.day];
  if (APP.artIdx < d.articles.length-1) { APP.artIdx++; renderReading(); }
}

function toggleTrans() {
  const b=document.getElementById('transBox'), btn=document.getElementById('btnTrans');
  b.classList.toggle('show');
  btn.textContent = b.classList.contains('show') ? '🇨🇳 收起翻译' : '🇨🇳 中文翻译';
}

function renderVocab() {
  const c = document.getElementById('pane-vocab');
  const voc = DAYS[APP.day]?.vocab || [];
  c.innerHTML = `<div class="vocab-filter">
      <span class="vf-btn active" onclick="filterVocab('all',this)">全部 (${voc.length})</span>
      <span class="vf-btn" onclick="filterVocab('f',this)">名词</span>
      <span class="vf-btn" onclick="filterVocab('m',this)">动词</span>
      <span class="vf-btn" onclick="filterVocab('n',this)">其它</span>
    </div>` +
    voc.map(v=>`
    <div class="vocab-card" data-pos="${v.pos}">
      <div class="vocab-word">${v.w} <span class="vocab-pos">${v.pos}</span></div>
      <div class="vocab-meaning">${v.m}</div>
      <div class="vocab-ex">${v.ex}</div>
      <div class="vocab-zh">${v.zh}</div>
    </div>
  `).join('');
}

function filterVocab(type, el) {
  document.querySelectorAll('.vf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.vocab-card').forEach(c=>{
    if (type==='all') c.style.display='block';
    else if (type==='f' && c.dataset.pos.includes('f')) c.style.display='block';
    else if (type==='m' && c.dataset.pos.includes('v.')) c.style.display='block';
    else if (type==='n') c.style.display='block';
    else c.style.display='none';
  });
}

// ========================
// 测试页
// ========================
let qs={cur:0,score:0,data:[], answered:false};

function renderQuiz() {
  qs={cur:0,score:0,data:DAYS[APP.day]?.quiz||[],answered:false};
  document.getElementById('pane-quiz').innerHTML = `
    <div id="quizWrap"></div>
    <div class="quiz-result" id="quizResult"></div>
  `;
  showQ();
}

function showQ() {
  const c = document.getElementById('quizWrap');
  if (qs.cur >= qs.data.length) { showR(); return; }
  const q = qs.data[qs.cur];
  const total = qs.data.length;
  c.innerHTML = `
    <div class="quiz-progress">进度：${qs.cur+1} / ${total}（需 ≥${Math.ceil(total*0.8)} 题正确）</div>
    <div class="quiz-q"><b>Frage ${qs.cur+1}/${total}</b><br>${q.q.replace(/\n/g,'<br>')}</div>
    <div class="quiz-opts">
      ${q.opts.map((o,i)=>`<div class="quiz-opt" onclick="selQ(this,${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}
    </div>
    <button class="btn-quiz-submit" id="quizSub" disabled onclick="subQ()">提交答案</button>
  `;
  qs.answered = false;
}

function selQ(el,i) {
  if (qs.answered) return;
  document.querySelectorAll('.quiz-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  qs.sel = i;
  document.getElementById('quizSub').disabled = false;
}

function subQ() {
  qs.answered = true;
  const q = qs.data[qs.cur];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o,i)=>{
    if(i===q.ans) o.classList.add('correct');
    else if(i===qs.sel&&i!==q.ans) o.classList.add('wrong');
    o.onclick = null;
  });
  if(qs.sel===q.ans) qs.score++;
  qs.cur++;
  const total = qs.data.length;
  setTimeout(showQ, 1000);
}

function showR() {
  const total = qs.data.length;
  const need = Math.ceil(total * 0.8);
  const pct = total ? Math.round(qs.score/total*100) : 0;
  const r = document.getElementById('quizResult');
  r.style.display = 'block';
  if (qs.score >= need) {
    r.className = 'quiz-result pass';
    r.innerHTML = `🎉 <b>${pct}% 正确！（${qs.score}/${total}）</b><br>恭喜通过今日测试！（需 ≥80%）<br><button class="modal-btn" style="margin-top:10px;padding:8px 24px;font-size:13px;border:none;border-radius:8px;background:#0F6E56;color:white;cursor:pointer" onclick="completeDay()">完成打卡 ✅</button>`;
  } else {
    r.className = 'quiz-result fail';
    r.innerHTML = `😅 <b>${pct}% 正确</b>（${qs.score}/${total}）<br>需要 ${need}/${total} 题正确才能通过<br><button class="btn-quiz-submit" style="margin-top:10px;width:auto" onclick="renderQuiz()">重新测试</button>`;
  }
  document.getElementById('quizWrap').innerHTML = '';
}

function completeDay() {
  document.getElementById('nextDayNum').textContent = APP.currentDay+1;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  if(!APP.completed.includes(APP.currentDay)) {
    APP.completed.push(APP.currentDay);
    APP.currentDay++;
  }
  // 把当天词汇加入 vocabAll
  const dayVoc = DAYS[APP.currentDay-1]?.vocab || [];
  dayVoc.forEach(v=>{ if(!APP.vocabAll.find(x=>x.w===v.w)) APP.vocabAll.push(v); });
  goBack();
}
